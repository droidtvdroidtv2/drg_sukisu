name: Build resukisu Kernel (Nokia DRG - Fork Source)

on:
  workflow_dispatch:

env:
  # ใช้ Kernel Source จากคลังที่คุณ Fork มา
  KERNEL_SOURCE: "https://github.com/droidtvdroidtv2/android_kernel_nokia_sdm660"
  KERNEL_BRANCH: "lineage-22.1"
  DEFCONFIG: "nokia_defconfig"
  ARCH: "arm64"
  CLANG_URL: "https://github.com/kdrag0n/proton-clang"

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3

      - name: Download Toolchain (Proton-Clang)
        run: |
          git clone --depth=1 ${{ env.CLANG_URL }} ~/clang

      - name: Clone Kernel Source From Fork
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel-source

      - name: Inject resukisu Source
        run: |
          cd kernel-source
          # ดึงสคริปต์ติดตั้ง resukisu มาฝังในโครงสร้าง Kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Compile Kernel
        run: |
          cd kernel-source
          export PATH="$HOME/clang/bin:$PATH"
          
          # เริ่มต้นด้วยไฟล์ Config ที่กำหนดไว้
          make O=out ARCH=${{ env.ARCH }} ${{ env.DEFCONFIG }}
          
          # สั่งบิลด์ด้วย Clang
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          
          # ระบุข้อมูลอุปกรณ์เป็นของ Nokia DRG
          sed -i 's/device.name1=maguro/device.name1=DRG/' AnyKernel3/anykernel.sh
          sed -i 's/device.name2=toro/device.name2=DRG_sprout/' AnyKernel3/anykernel.sh
          
          # ค้นหาไฟล์ตระกูล Image เพื่อนำไปจัดชุดแฟลช
          find kernel-source/out/arch/arm64/boot -name "Image.gz-dtb" -exec cp {} AnyKernel3/ \; || find kernel-source/out/arch/arm64/boot -name "Image*" -exec cp {} AnyKernel3/ \;
          
          cd AnyKernel3
          zip -r9 ../resukisu-Nokia-DRG-Kernel.zip * -x .git README.md *placeholder

      - name: Upload Finished Zip
        uses: actions/upload-artifact@v4
        with:
          name: resukisu-Nokia-DRG-Kernel
          path: resukisu-Nokia-DRG-Kernel.zip
