name: 🔨 Build Kernel — Nokia SDM660 + SukiSU-Ultra

on:
  workflow_dispatch:
    inputs:
      DEFCONFIG:
        description: "nokia_defconfig"
        required: true
        default: "sdm660-perf_defconfig"
      ANYKERNEL_REPO:
        description: "URL ของ AnyKernel3 repo"
        required: true
        default: "https://github.com/osm0sis/AnyKernel3"
      ANYKERNEL_BRANCH:
        description: "Branch ของ AnyKernel3"
        required: true
        default: "master"

env:
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    name: 🔨 Build Kernel
    runs-on: ubuntu-22.04

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Install tools ───────────────────────────────────────────────
      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git curl wget python3 make \
            flex bison libssl-dev libelf-dev \
            bc zip unzip lz4 \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            clang lld llvm \
            binutils-aarch64-linux-gnu

      # ── 3. SukiSU-Ultra ────────────────────────────────────────────────
      # clone โดยตรงแทน setup.sh เพื่อหลีกเลี่ยงปัญหา non-GKI path detection
      - name: ⚡ Apply SukiSU-Ultra (Non-GKI)
        run: |
          echo "==> Cloning SukiSU-Ultra..."
          git clone --depth=1 \
            https://github.com/ShirkNeko/SukiSU-Ultra \
            KernelSU
          echo "[INFO] KernelSU version: $(cat KernelSU/VERSION 2>/dev/null || echo 'N/A')"
          ls KernelSU/kernel/ || { echo "[ERROR] KernelSU/kernel/ missing"; exit 1; }

          echo "==> Integrating into kernel build..."
          if [ -d "drivers" ]; then
            echo "  [+] Method: drivers/ symlink"
            ln -sf ../../KernelSU/kernel drivers/kernelsu
            echo ""                                     >> drivers/Makefile
            echo "obj-\$(CONFIG_KSU) += kernelsu/"     >> drivers/Makefile
            echo ""                                     >> drivers/Kconfig
            echo "source \"drivers/kernelsu/Kconfig\"" >> drivers/Kconfig
          else
            echo "  [+] Method: root Makefile"
            echo ""                                          >> Makefile
            echo "obj-\$(CONFIG_KSU) += KernelSU/kernel/"  >> Makefile
          fi
          echo "[OK] SukiSU-Ultra integration complete"

      # ── 4. Configure kernel ────────────────────────────────────────────
      # - เปิด CONFIG_KSU
      # - ปิด CONFIG_KSU_WITH_KPROBES เพราะเป็น non-GKI (4.14)
      #   ใช้ manual hook แทน ซึ่ง setup.sh จัดการให้แล้ว
      - name: ⚙️ Configure kernel
        run: |
          make O=out ARCH=$ARCH ${{ inputs.DEFCONFIG }}

          ./scripts/config --file out/.config \
            -e CONFIG_KSU \
            -d CONFIG_KSU_WITH_KPROBES

          make O=out ARCH=$ARCH olddefconfig

          echo "[INFO] KSU configs:"
          grep "CONFIG_KSU" out/.config || echo "[WARN] ไม่พบ CONFIG_KSU — ตรวจ SukiSU-Ultra"

      # ── 5. Build ───────────────────────────────────────────────────────
      - name: 🏗️ Build kernel
        run: |
          make O=out ARCH=$ARCH \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            -j$(nproc --all)

      # ── 6. Verify output ───────────────────────────────────────────────
      - name: 🔍 Find kernel image
        run: |
          echo "[INFO] Boot directory:"
          ls -lh out/arch/arm64/boot/

          FOUND=""
          for img in Image.gz-dtb Image.gz Image; do
            if [ -f "out/arch/arm64/boot/$img" ]; then
              echo "KERNEL_IMAGE=out/arch/arm64/boot/$img" >> $GITHUB_ENV
              echo "[INFO] ใช้ kernel image: $img"
              FOUND="$img"
              break
            fi
          done

          [ -z "$FOUND" ] && { echo "[ERROR] ไม่พบ kernel image!"; exit 1; }

      # ── 7. Package ─────────────────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 \
            ${{ inputs.ANYKERNEL_REPO }} \
            -b ${{ inputs.ANYKERNEL_BRANCH }} \
            AnyKernel3

          cp "${{ env.KERNEL_IMAGE }}" AnyKernel3/
          [ -f out/arch/arm64/boot/dtb      ] && cp out/arch/arm64/boot/dtb      AnyKernel3/ && echo "[INFO] dtb copied"
          [ -f out/arch/arm64/boot/dtbo.img  ] && cp out/arch/arm64/boot/dtbo.img AnyKernel3/ && echo "[INFO] dtbo.img copied"

          ZIP="Nokia-SDM660-SukiSU-$(date +%Y%m%d-%H%M).zip"
          cd AnyKernel3
          zip -r9 "../$ZIP" . -x ".git*" -x "*.gitignore" -x "README.md"
          cd ..

          echo "ZIP=$ZIP" >> $GITHUB_ENV
          echo "[INFO] Package: $ZIP ($(du -sh $ZIP | cut -f1))"

      # ── 8. Upload ──────────────────────────────────────────────────────
      - name: 🚀 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nokia-SDM660-SukiSU-Ultra
          path: Nokia-SDM660-SukiSU-*.zip
          retention-days: 7
